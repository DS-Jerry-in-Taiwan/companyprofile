openapi: 3.0.2
servers:
  - url: /v1
info:
  title: 公司簡介 AI 生成/優化 API Document (Sync MVP)
  description: |-
    同步 MVP 版本：單一端點完成 GENERATE / OPTIMIZE 兩種模式。
    在單一請求生命週期內完成驗證、生成/優化、後處理並返回結果。
  version: 1.1.0
  contact:
    email: datascience@staff.1111.com.tw
  license:
    name: Proprietary

tags:
  - name: company-profile
    description: 公司簡介生成與優化 API

paths:
  /company/profile/process:
    post:
      tags:
        - company-profile
      summary: 同步生成或優化公司簡介
      description: |-
        mode=GENERATE 時需提供 companyUrl。
        mode=OPTIMIZE 時需提供 brief。
      operationId: processCompanyProfile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompanyProfileProcessRequest'
      responses:
        '200':
          description: 成功生成或優化公司簡介
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompanyProfileResponse'
        '400':
          description: 請求格式錯誤或參數驗證失敗
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: 伺服器內部錯誤或外部服務調用失敗
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServerError'

components:
  schemas:
    CompanyProfileProcessRequest:
      type: object
      properties:
        organNo:
          type: integer
          description: 公司編號
          example: 69191119
        organ:
          type: string
          description: 公司名稱
          example: 德義資訊股份有限公司
        mode:
          type: string
          enum: [GENERATE, OPTIMIZE]
          description: 操作模式
          example: GENERATE
        companyUrl:
          type: string
          format: uri
          description: 公司官網 URL（GENERATE 模式必填）
          example: https://www.teyi.com.tw
        brief:
          type: string
          description: 原始公司描述文字（OPTIMIZE 模式必填）
          example: 德義資訊以累積多年的資訊系統專業技術...
        optimization_mode:
          type: string
          enum: [STANDARD, CONCISE, DETAILED]
          default: STANDARD
          description: 優化模式（OPTIMIZE 選填）
          example: STANDARD
        trade:
          type: integer
          description: 產業類型代碼（選填）
          example: 100103
        word_limit:
          type: integer
          minimum: 50
          maximum: 2000
          description: 字數限制（選填）
          example: 300
      required:
        - organNo
        - organ
        - mode

    CompanyProfileResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        organNo:
          type: integer
          example: 69191119
        organ:
          type: string
          example: 德義資訊股份有限公司
        mode:
          type: string
          enum: [GENERATE, OPTIMIZE]
          example: GENERATE
        body_html:
          type: string
          description: 後處理後的 HTML 內容
          example: <p>德義資訊專注於企業級軟體開發與系統整合。</p>
        summary:
          type: string
          description: 簡短摘要
          example: 德義資訊提供企業軟體開發與整合服務。
        tags:
          type: array
          items:
            type: string
          example: [軟體開發, 系統整合, IT顧問]
      required:
        - success
        - organNo
        - organ
        - mode
        - body_html
        - summary
        - tags

    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        code:
          type: string
          example: INVALID_REQUEST
        message:
          type: string
          example: companyUrl is required for GENERATE mode
        details:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
              reason:
                type: string
      required:
        - success
        - code
        - message

    ServerError:
      type: object
      properties:
        success:
          type: boolean
          example: false
        code:
          type: string
          example: INTERNAL_SERVER_ERROR
        message:
          type: string
          example: failed to call external service
        request_id:
          type: string
          example: req-20260327-0001
      required:
        - success
        - code
        - message

  securitySchemes:
    apiKeyAuth:
      type: apiKey
      name: X-API-Key
      in: header

security:
  - apiKeyAuth: []