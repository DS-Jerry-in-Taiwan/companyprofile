openapi: 3.0.2
servers:
  - url: /api/v1/
info:
  title: 公司描述優化 API Document
  description: |-
    這是公司簡介描述優化 API document。使用大型語言模型(LLM)來優化企業提供的公司描述文字。

    ## 主要功能
    - 自動優化公司描述文字、提升可讀性
    - 提供不同優化模式：
      1. 標準模式：平衡簡潔與詳細度的一般優化
      2. 簡潔模式：生成更精簡的公司描述
      3. 詳細模式：生成更詳盡的公司描述

  version: 1.0.0
  contact:
    email: datascience@staff.1111.com.tw
  license:
    name: Proprietary
    
tags:
  - name: organ-optimization
    description: 公司簡介優化相關API

paths:
  /optimize_organ_brief:
    post:
      tags:
        - organ-optimization
      summary: 優化公司簡介文字
      description: 改寫公司簡介文字
      operationId: optimizeOrganBrief
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OptimizationRequest'
      responses:
        '200':
          description: 公司簡介優化成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OptimizationResponse'
        '400':
          description: 請求格式無效
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OptimizationResponseError'
        '500':
          description: 伺服器處理錯誤
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServerError'

components:
  schemas:
    OptimizationRequest:
      type: object
      properties:
        organNo:
          type: integer
          description: 公司編號
          example: 69191119
        organ:
          type: string
          description: 公司名稱
          example: "德義資訊股份有限公司"
        brief:
          type: string
          description: 原始公司描述文字
          example: "德義資訊以累積多年的資訊系統專業技術與完整豐富的軟體開發實力，提供企業用戶軟體高品質服務，是台灣地區無論是金融、電信、工業製造以及政府部門等領域，高階軟體開發服務供應鏈的領導廠商。我們專精微軟ASP.NET及Oracle JAVA等技術，依照各技術領域需求分派開發工程師、測試工程師及團隊經理，透過短時間內迅速的調派作業，成功建立團隊協助企業達成預期目標。不論是單一程式開發工程師或多人開發團隊，皆能提供符合現有企業架構的需求人力。此外，更注重同仁在技術及職涯的發展，根據實務現況及新技術資訊，每年規劃完善教育訓練課程及邀請 JAVA 及微軟、資料庫等名師舉辦技術講座。藉由專業人才及各種產業相關知識上深厚能力的緊密結合，德義充分協助了客戶縮短產品上市時間在關鍵任務及知識密集的系統上降低軟體開發過程中的風險。並在「用心」、「專業」及「創新」的經營理念下，創造員工、客戶及公司的三方皆贏的永續經營。<br />經營理念<br />◎「用心」 － 對人對事以用心為第一要務，是我們最真誠的態度。 ◎「專業」 － 用高品質的程式技術，達成目標。 ◎「創新」 － 用成熟而不陳腐的創意，加速完成專案任務。 德義秉持著三大理念，創造員工、客戶及公司所有人都滿意而三方皆贏的永續經營。"
        products:
          type: string
          description: 該公司提供的產品或服務
          example: "企業軟體開發、系統整合服務、IT人力派遣、專案管理服務、企業資訊系統顧問服務"
        optimization_mode:
          type: integer
          enum: [1, 2, 3]
          description: 優化模式代碼（選填）：1-標準模式，2-簡潔模式，3-詳細模式
          example: 1
          default: 1
        trade:
          type: integer
          description: 產業類型代碼（選填，提供更精確的優化）
          example: 100103
        word_limit:
          type: integer
          description: 字數限制（選填，預設不限制）
          example: 300
      required:
        - brief
        - organNo
    
    OptimizationResponse:
      type: object
      properties:
        organNo:
          type: integer
          description: 公司編號
          example: 69191119
        organ:
          type: string
          description: 公司名稱
          example: "德義資訊股份有限公司"
        brief:
          type: string
          description: 原始公司描述文字
          example: "德義資訊以累積多年的資訊系統專業技術與完整豐富的軟體開發實力，提供企業用戶軟體高品質服務，是台灣地區無論是金融、電信、工業製造以及政府部門等領域，高階軟體開發服務供應鏈的領導廠商。我們專精微軟ASP.NET及Oracle JAVA等技術，依照各技術領域需求分派開發工程師、測試工程師及團隊經理，透過短時間內迅速的調派作業，成功建立團隊協助企業達成預期目標。不論是單一程式開發工程師或多人開發團隊，皆能提供符合現有企業架構的需求人力。此外，更注重同仁在技術及職涯的發展，根據實務現況及新技術資訊，每年規劃完善教育訓練課程及邀請 JAVA 及微軟、資料庫等名師舉辦技術講座。藉由專業人才及各種產業相關知識上深厚能力的緊密結合，德義充分協助了客戶縮短產品上市時間在關鍵任務及知識密集的系統上降低軟體開發過程中的風險。並在「用心」、「專業」及「創新」的經營理念下，創造員工、客戶及公司的三方皆贏的永續經營。<br />經營理念<br />◎「用心」 － 對人對事以用心為第一要務，是我們最真誠的態度。 ◎「專業」 － 用高品質的程式技術，達成目標。 ◎「創新」 － 用成熟而不陳腐的創意，加速完成專案任務。 德義秉持著三大理念，創造員工、客戶及公司所有人都滿意而三方皆贏的永續經營。"
        products:
          type: string
          description: 該公司提供的產品或服務
          example: "＊軟體開發服務\n包含系統建置、系統整合及顧問服務\n＊專案開發\n德義資訊專案團隊憑藉在網際網路、應用軟體開發等多方面業務的綜合實力和豐富經驗，為使用者提供全面的專案軟體服務。\n＊專業技術顧問服務\n－駐點程式設計服務\n－駐點軟體測試服務\n－應用軟體發展專業委外\n＊.雲端計算應用轉換工具及相關技術服務\n＊SOA資訊技術服務\n＊Web 2.0資訊技術服務\n＊代理並整合知名國際品牌之軟體系統"
        result:
          type: string
          description: 優化後的公司描述文字
          example: "德義資訊是台灣領先的軟體開發服務供應商，憑藉多年累積的專業技術和豐富經驗，為金融、電信、工業製造及政府部門等領域提供高品質的企業級解決方案。我們提供完整的軟體開發服務，包括系統建置、系統整合及顧問服務，並擁有強大的專案開發團隊，能夠運用網際網路和各類應用軟體開發的綜合實力，為客戶提供全方位的專案支援。\n德義專精於微軟ASP.NET及Oracle JAVA技術，同時拓展雲端計算應用、SOA架構及Web 2.0技術服務，滿足現代企業的多元需求。我們的專業技術顧問服務包括駐點程式設計、軟體測試及應用軟體發展專業委外，能根據客戶需求快速組建專業團隊，有效協助企業達成目標並降低開發風險。\n\n德義資訊注重人才培育與技術精進，定期舉辦教育訓練和技術講座，確保團隊始終保持市場領先地位。透過代理並整合知名國際品牌軟體系統，我們為客戶提供最前沿的技術與解決方案。<br />經營理念<br />◎「用心」 － 全心投入每個專案，用誠懇態度對待每位客戶與夥伴。 ◎「專業」 － 堅持技術卓越，以最高標準完成每項工作。 ◎「創新」 － 結合創新思維與成熟技術，為客戶創造獨特價值。德義秉持這三大核心理念，致力創造客戶、員工與企業共同成長的永續經營模式。。"
        optimization_mode:
          type: integer
          description: 使用的優化模式代碼：1-標準模式，2-簡潔模式，3-詳細模式
          example: 1
          
    OptimizationResponseError:
      type: object
      properties:
        code:
          type: string
          example: "INVALID_REQUEST"
        message:
          type: string
          example: "請求格式無效"
        details:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
              message:
                type: string
          example:
            - field: "brief"
              message: "公司簡介不能為空"
    
    ServerError:
      type: object
      properties:
        code:
          type: string
          example: "INTERNAL_SERVER_ERROR"
        message:
          type: string
          example: "處理請求時發生錯誤"
        request_id:
          type: string
          example: "req-20250311-123456"
      
  securitySchemes:
    apiKeyAuth:
      type: apiKey
      name: X-API-Key
      in: header
      description: API金鑰驗證

security:
  - apiKeyAuth: []