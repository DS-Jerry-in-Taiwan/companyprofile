service: organ-brief-optimization

provider:
  name: aws
  runtime: python3.11
  region: ap-northeast-1
  stage: ${opt:stage, 'dev'}
  environment:
    STAGE: ${self:provider.stage}
    LOG_LEVEL: ${self:custom.logLevel.${self:provider.stage}, 'INFO'}
    GEMINI_API_KEY: ${ssm:/organ-brief/gemini-api-key}
    GEMINI_MODEL: ${ssm:/organ-brief/gemini-model}
    TAVILY_API_KEY: ${ssm:/organ-brief/tavily-api-key}
  
  ecr:
    images:
      flaskApiImg:
        path: .
        file: src/functions/Dockerfile
        buildArgs:
          STAGE: ${self:provider.stage}
          VERSION: ${self:custom.deployVersion.${self:provider.stage}, 'dev'}
          BUILD_DATE: ${self:custom.buildDate}
  
  iamRoleStatements:
    - Effect: Allow
      Action:
        - logs:CreateLogGroup
        - logs:CreateLogStream
        - logs:PutLogEvents
      Resource: "arn:aws:logs:${self:provider.region}:*:*"
    - Effect: Allow
      Action:
        - ssm:GetParameter
        - ssm:GetParameters
        - ssm:GetParametersByPath
      Resource: 
        - "arn:aws:ssm:${self:provider.region}:*:parameter/organ-brief*"
    - Effect: Allow
      Action:
        - kms:Decrypt
      Resource: "*"
    - Effect: Allow
      Action:
        - elasticloadbalancing:RegisterTargets
        - elasticloadbalancing:DeregisterTargets
        - elasticloadbalancing:CreateTargetGroup
        - elasticloadbalancing:DeleteTargetGroup
        - elasticloadbalancing:DescribeTargetGroups
        - elasticloadbalancing:CreateListenerRule
        - elasticloadbalancing:DeleteListenerRule
        - elasticloadbalancing:DescribeListenerRules
        - elasticloadbalancing:ModifyListenerRule
      Resource: "*"
    - Effect: Allow
      Action:
        - lambda:AddPermission
        - lambda:RemovePermission
      Resource: "*"
    - Effect: Allow
      Action:
        - dynamodb:PutItem
        - dynamodb:GetItem
        - dynamodb:Query
        - dynamodb:Scan
      Resource:
        - !GetAtt LlmResponsesTable.Arn
        - !GetAtt ErrorLogsTable.Arn
        - !Sub "${LlmResponsesTable.Arn}/index/*"
        - !Sub "${ErrorLogsTable.Arn}/index/*"

custom:
  logLevel:
    dev: DEBUG
    prod: INFO
  deployVersion:
    dev: ${env:DEPLOY_VERSION, 'dev'}
  buildDate: ${env:BUILD_DATE, 'unknown'}
  # ALB HTTPS Listener ARN (依 stage 區分)
  albListenerArn:
    dev: arn:aws:elasticloadbalancing:ap-northeast-1:132815414471:listener/app/1111datasciencedev-aloadbalancer/05c2bed73419cd11/8a1eff3be46df4e4
    prod: arn:aws:elasticloadbalancing:ap-northeast-1:132815414471:listener/app/1111datascience-aloadbalancer/41580228b8eab2ba/b4273c29616b5962
  # ALB rule priority (依 stage 區分)
  albPriority:
    dev: 77
    prod: 78
  # ALB rule path pattern (依 stage 區分)
  albPath:
    dev: /organ-brief-dev/api/recurit/optimize/*
    prod: /organ-brief-prd/api/recurit/optimize/*
  # Target Group 名稱 (依 stage 區分)
  albTargetGroupName:
    dev: organ-brief-opt-dev
    prod: organ-brief-opt-prd

functions:
  flaskApi:
    image: 
      name: flaskApiImg
    memorySize: 1024
    timeout: 120

resources:
  Resources:
    # Target Group (自訂名稱)
    FlaskApiTargetGroup:
      Type: AWS::ElasticLoadBalancingV2::TargetGroup
      Properties:
        Name: ${self:custom.albTargetGroupName.${self:provider.stage}}
        TargetType: lambda
        Targets:
          - Id: !GetAtt FlaskApiLambdaFunction.Arn

    # ALB Listener Rule
    FlaskApiAlbListenerRule:
      Type: AWS::ElasticLoadBalancingV2::ListenerRule
      Properties:
        ListenerArn: ${self:custom.albListenerArn.${self:provider.stage}}
        Priority: ${self:custom.albPriority.${self:provider.stage}}
        Conditions:
          - Field: path-pattern
            Values:
              - ${self:custom.albPath.${self:provider.stage}}
        Actions:
          - Type: forward
            TargetGroupArn: !Ref FlaskApiTargetGroup

    # Lambda 執行權限 (允許 ALB 調用 Lambda)
    FlaskApiLambdaPermission:
      Type: AWS::Lambda::Permission
      Properties:
        FunctionName: !GetAtt FlaskApiLambdaFunction.Arn
        Action: lambda:InvokeFunction
        Principal: elasticloadbalancing.amazonaws.com
        SourceArn: !Ref FlaskApiTargetGroup

    # ── DynamoDB: LLM 回應記錄 ─────────────────────
    LlmResponsesTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:provider.stage}-llm-responses
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: trace_id
            AttributeType: S
          - AttributeName: created_at
            AttributeType: S
          - AttributeName: organ_no
            AttributeType: S
          - AttributeName: status
            AttributeType: S
        KeySchema:
          - AttributeName: trace_id
            KeyType: HASH
          - AttributeName: created_at
            KeyType: RANGE
        GlobalSecondaryIndexes:
          - IndexName: organ_no-index
            KeySchema:
              - AttributeName: organ_no
                KeyType: HASH
            Projection:
              ProjectionType: ALL
          - IndexName: status-index
            KeySchema:
              - AttributeName: status
                KeyType: HASH
            Projection:
              ProjectionType: KEYS_ONLY

    # ── DynamoDB: 錯誤日誌記錄 ─────────────────────
    ErrorLogsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:provider.stage}-error-logs
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: trace_id
            AttributeType: S
          - AttributeName: created_at
            AttributeType: S
          - AttributeName: error_code
            AttributeType: S
        KeySchema:
          - AttributeName: trace_id
            KeyType: HASH
          - AttributeName: created_at
            KeyType: RANGE
        GlobalSecondaryIndexes:
          - IndexName: error_code-index
            KeySchema:
              - AttributeName: error_code
                KeyType: HASH
            Projection:
              ProjectionType: ALL
